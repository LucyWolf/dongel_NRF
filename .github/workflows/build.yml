name: Build Headpat Dongle

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install PlatformIO packages
        run: pio pkg install

      - name: Inject version from tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v ]]; then VER="${TAG#v}"; else VER="0.0.0-dev"; fi
          sed -i "s/#define VERSION\s*\"[^\"]*\"/#define VERSION            \"$VER\"/" src/main.cpp
          echo "Version set to $VER"

      - name: Build firmware (both boards)
        run: pio run

      - name: Collect UF2 files
        run: |
          cp .pio/build/nicenano/firmware.uf2 dongle-nicenano.uf2
          cp .pio/build/holyiot/firmware.uf2  dongle-holyiot.uf2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dongle-firmware
          path: |
            dongle-nicenano.uf2
            dongle-holyiot.uf2

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Headpat Dongle ${{ github.ref_name }}
          files: |
            dongle-nicenano.uf2
            dongle-holyiot.uf2
          generate_release_notes: true
